{% extends "base.html" %}
{% block title %}Register - MentorHub{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Join MentorHub today</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-briefcase"></i> Role</label>
                    <select name="role" required>
                        <option value="mentee">Mentee</option>
                        <option value="mentor">Mentor</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-certificate"></i> Specialization</label>
                <input type="text" name="specialization" placeholder="Optional">
            </div>
            <button type="submit" class="btn-primary full-width">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
