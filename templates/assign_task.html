{% extends "base.html" %}
{% block title %}Assign Task to Mentee{% endblock %}
{% block content %}
<div class="assign-task-container">

    <!-- HEADER CARD -->
    <div class="assign-task-header">
        <h1><i class="fas fa-plus-circle"></i> Assign Task to Mentee</h1>
        <p>Select mentee and create assignment</p>
    </div>

    <!-- MAIN FORM -->
    <form method="POST" enctype="multipart/form-data" class="assign-task-form">
        <!-- Mentee Selection -->
        <div class="form-group">
            <label for="student">
                <i class="fas fa-user-graduate"></i> Select Mentee
            </label>
            <select name="student" id="student" class="form-input" required>
                <option value="">Choose a mentee...</option>
                {% for mentee in mentees %}
                    <option value="{{ mentee }}">{{ mentee }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Task Title -->
        <div class="form-group">
            <label for="title">
                <i class="fas fa-heading"></i> Task Title
            </label>
            <input type="text" 
                   name="title" 
                   id="title" 
                   class="form-input" 
                   placeholder="e.g. Final Project Report" 
                   required>
        </div>

        <!-- Task Description -->
        <div class="form-group">
            <label for="description">
                <i class="fas fa-align-left"></i> Task Description
            </label>
            <textarea name="description" 
                      id="description" 
                      class="form-input" 
                      rows="5" 
                      placeholder="Detailed instructions for your mentee..."
                      required></textarea>
        </div>

        <!-- Deadline -->
        <div class="form-group">
            <label for="deadline">
                <i class="fas fa-calendar-alt"></i> Deadline
            </label>
            <input type="datetime-local" 
                   name="deadline" 
                   id="deadline" 
                   class="form-input" 
                   required>
            <div class="file-help">Select date & time when task is due</div>
        </div>

        <!-- File Upload -->
        <div class="form-group">
            <label for="file">
                <i class="fas fa-paperclip"></i> Reference Files
            </label>
            <input type="file" 
                   name="file" 
                   id="file" 
                   class="form-input" 
                   accept=".pdf,.doc,.docx">
            <div class="file-help">Optional: PDF, DOC, DOCX (max 10MB)</div>
        </div>

        <!-- Action Buttons -->
        <div class="form-actions">
            <a href="/dashboard" class="btn-clean primary">← Back to Dashboard</a>
            <button type="submit" class="btn-primary">
                <i class="fas fa-rocket"></i> Assign Task →
            </button>
        </div>
    </form>

    
</div>
{% endblock %}
